# Pre-commit hooks — fast, local feedback before commits.
# NOTE: Local hooks can be bypassed (--no-verify). CI + branch protection are the
# authoritative enforcement layer (see CONTRIBUTING.md §7).
#
# Install:  pipx install pre-commit  (or: pip install pre-commit)
# Enable:   pre-commit install
# Run all:  pre-commit run --all-files

minimum_pre_commit_version: "3.5.0"
fail_fast: false

repos:
  # ---- Generic hygiene -----------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"] # block large blobs; use LFS/artifacts instead
      - id: check-yaml
      - id: check-json
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ---- Secret scanning -----------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # ---- Formatting / linting (adjust to your stack) -------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.6
    hooks:
      - id: ruff # Python lint
        args: ["--fix"]
      - id: ruff-format # Python format

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier # JS/TS/JSON/MD/YAML formatting
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown]

  # ---- Project-local gates -------------------------------------------------
  - repo: local
    hooks:
      # Validate every changed spec file against the JSON Schema.
      - id: spec-schema-validate
        name: Validate spec files against schema
        entry: python scripts/check_traceability.py --schema-only
        language: system
        files: ^spec/.*\.(ya?ml)$
        pass_filenames: false

      # Enforce spec -> success criteria -> validation -> downstream traceability.
      - id: traceability-check
        name: Traceability & success-criteria check
        entry: python scripts/check_traceability.py
        language: system
        files: ^(spec/|generated/|tests/|eval/).*
        pass_filenames: false
